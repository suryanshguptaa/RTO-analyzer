<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI RTO & Returns Intelligence</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 🚨 ENVIRONMENT KEY INJECTION 🚨
        // Keep this as an empty string.
        const apiKey = ""; 
        // ==========================================

        const { useState, useEffect, useRef } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts;

        // Icon Component
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = ''; 
                    const iElement = document.createElement('i');
                    iElement.setAttribute('data-lucide', kebabName);
                    if (className) iElement.setAttribute('class', className);
                    iconRef.current.appendChild(iElement);
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, kebabName, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        // Mock Data
        const TREND_DATA = [{ name: 'W1', rto: 12 }, { name: 'W2', rto: 19 }, { name: 'W3', rto: 15 }, { name: 'W4', rto: 22 }];
        const COURIER_DATA = [
            { id: 1, name: "Delhivery", rto: "4.2%", cost: "₹45", rating: 4.8 },
            { id: 2, name: "BlueDart", rto: "2.1%", cost: "₹85", rating: 4.9 },
            { id: 3, name: "Ecom Express", rto: "6.8%", cost: "₹38", rating: 4.1 }
        ];
        const REASONS = [
            { name: 'Packaging Damaged', value: 45, color: '#6366f1' },
            { name: 'Quality Issues', value: 25, color: '#f59e0b' },
            { name: 'Wrong Item', value: 15, color: '#10b981' },
            { name: 'Customer Rejected', value: 15, color: '#ef4444' }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [userApiKey, setUserApiKey] = useState(""); 
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [scanResult, setScanResult] = useState(null);
            const [rcaResult, setRcaResult] = useState(null);
            const [activeModelName, setActiveModelInfo] = useState("Standby");

            const extractJSON = (text) => {
                try {
                    const firstBrace = text.indexOf('{');
                    const lastBrace = text.lastIndexOf('}');
                    if (firstBrace === -1 || lastBrace === -1) throw new Error("Invalid format received from AI.");
                    return JSON.parse(text.substring(firstBrace, lastBrace + 1));
                } catch (e) {
                    throw new Error("Failed to parse AI data. The AI did not return a valid JSON object.");
                }
            };

            // ==========================================
            // 🤖 AUTO-DISCOVERY AI ENGINE
            // Guaranteed to never throw "Model Not Found"
            // ==========================================
            const callGeminiReal = async (promptText, imageBase64 = null, mimeType = "image/jpeg") => {
                setLoading(true);
                setError(null);
                setActiveModelInfo("Discovering available models...");

                const finalKey = apiKey || userApiKey.trim();
                
                // --- ADDED VALIDATION TO PREVENT ACCIDENTAL CODE PASTES ---
                if (!finalKey) {
                    setError("Missing API Key. Please paste your NEW API key in the sidebar.");
                    setLoading(false);
                    return null;
                }
                
                if (!finalKey.startsWith("AIza") || finalKey.length > 100) {
                    setError("Invalid API Key format. It looks like you accidentally pasted code or text instead of the key. Google API keys start with 'AIza'.");
                    setActiveModelInfo("Failed");
                    setLoading(false);
                    return null;
                }

                try {
                    let activeModel = "";

                    // STEP 1: Ask Google what models THIS specific key is allowed to use
                    if (apiKey) {
                        activeModel = "gemini-2.5-flash-preview-09-2025";
                    } else {
                        const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${finalKey}`);
                        const listData = await listRes.json();
                        
                        if (!listRes.ok) throw new Error(listData.error?.message || "Failed to validate API Key.");
                        
                        // Extract only valid generation models
                        const validModels = (listData.models || [])
                            .filter(m => m.supportedGenerationMethods?.includes("generateContent"))
                            .map(m => m.name.replace('models/', ''));
                            
                        if (validModels.length === 0) throw new Error("Your API Key has no generative models enabled.");

                        // Prefer the newest models, but ONLY if they are in your valid list
                        const preferred = imageBase64 
                            ? ['gemini-2.5-flash', 'gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-pro-vision'] 
                            : ['gemini-2.5-flash', 'gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-pro'];
                            
                        activeModel = preferred.find(m => validModels.includes(m)) || validModels[0];
                    }

                    setActiveModelInfo(`Using: ${activeModel}`);

                    // STEP 2: Use the strictly validated model for the request
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${finalKey}`;
                    
                    const parts = [{ text: promptText }];
                    if (imageBase64) parts.push({ inlineData: { mimeType: mimeType, data: imageBase64 } });

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts }] })
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error?.message || "Google API rejected the request.");
                    }

                    setLoading(false);
                    return extractJSON(data.candidates[0].content.parts[0].text);

                } catch (err) {
                    setLoading(false);
                    setActiveModelInfo("Failed");
                    setError(`${err.message}`);
                    return null;
                }
            };

            const handleImageAnalysis = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    const prompt = `Analyze this product image. Return ONLY a valid JSON object. Do not include markdown code block syntax. Use EXACTLY these keys:
                    {"item": "Product name", "rto_rate": "18%", "return_rate": "12%", "risks": ["Risk 1", "Risk 2", "Risk 3"], "packaging_advice": "Advice"}`;
                    const result = await callGeminiReal(prompt, base64, file.type);
                    if (result) setScanResult(result);
                };
                reader.readAsDataURL(file);
            };

            const handleDiagnostic = async () => {
                const prompt = `Logistics data: 45% returns due to Packaging Damaged. Return ONLY a valid JSON object. Do not include markdown code block syntax. Use EXACTLY these keys:
                {"root_cause": "Explanation", "actions": ["Step 1", "Step 2", "Step 3"]}`;
                const result = await callGeminiReal(prompt);
                if (result) setRcaResult(result);
            };

            return (
                <div className="flex flex-col md:flex-row min-h-screen">
                    <aside className="w-full md:w-72 bg-white border-r border-slate-200 flex flex-col z-10 p-8 shadow-sm">
                        <div className="flex items-center gap-4 mb-12">
                            <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl shadow-indigo-100">
                                <Icon name="ShieldCheck" className="text-white w-7 h-7" />
                            </div>
                            <span className="font-black text-2xl hidden md:block tracking-tighter">GEN-RTO</span>
                        </div>

                        <nav className="flex-1 space-y-3">
                            {[
                                { id: 'overview', icon: 'LayoutDashboard', label: 'Analytics Hub' },
                                { id: 'scan', icon: 'Camera', label: 'AI Product Scan' },
                                { id: 'fixes', icon: 'Zap', label: 'Smart Fixes' },
                            ].map((item) => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-4 px-5 py-4 rounded-[1.5rem] transition-all duration-300 font-bold ${
                                        activeTab === item.id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100' : 'text-slate-500 hover:bg-slate-50'
                                    }`}>
                                    <Icon name={item.icon} className="w-5 h-5" /> <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="mt-8 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                                <Icon name="Key" className="w-3 h-3" /> Paste NEW API Key Here
                            </p>
                            <input 
                                type="password" 
                                className="w-full text-xs p-2 rounded-lg border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 bg-white"
                                value={apiKey ? "Injected by Preview" : userApiKey}
                                onChange={(e) => !apiKey && setUserApiKey(e.target.value)}
                                disabled={!!apiKey}
                            />
                            <p className="text-[10px] text-slate-500 font-bold mt-3 border-t border-slate-200 pt-2 flex justify-between items-center">
                                AI Status: <span className="text-indigo-600 truncate ml-2" title={activeModelName}>{activeModelName}</span>
                            </p>
                        </div>
                    </aside>

                    <main className="flex-1 p-6 md:p-12 overflow-y-auto max-w-7xl mx-auto w-full">
                        {error && (
                            <div className="mb-8 p-5 bg-red-50 border border-red-200 rounded-2xl flex items-center gap-4 text-red-700 animate-in">
                                <div className="bg-red-100 p-2 rounded-xl"><Icon name="AlertCircle" className="w-6 h-6" /></div>
                                <div><h4 className="font-black text-sm uppercase tracking-widest">Error</h4><p className="font-bold text-sm mt-1">{error}</p></div>
                            </div>
                        )}

                        <header className="mb-12">
                            <h1 className="text-4xl font-black tracking-tight text-slate-900 underline decoration-indigo-200 decoration-8 underline-offset-4">Command Center</h1>
                            <p className="text-slate-500 mt-2 font-medium">Predicting e-commerce logistics failure through AI.</p>
                        </header>

                        {activeTab === 'overview' && (
                            <div className="space-y-10 animate-in">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {[{ label: 'Avg RTO Rate', val: '14.2%', color: 'text-red-500', icon: 'Package' }, { label: 'Return Rate', val: '8.5%', color: 'text-orange-500', icon: 'TrendingDown' }, { label: 'Revenue Saved', val: '₹42,300', color: 'text-indigo-600', icon: 'Star' }, { label: 'SLA Score', val: '98/100', color: 'text-green-500', icon: 'CheckCircle2' }].map((kpi, i) => (
                                        <div key={i} className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                            <div className="flex justify-between items-start mb-4">
                                                <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">{kpi.label}</p>
                                                <div className="p-3 bg-slate-50 rounded-2xl"><Icon name={kpi.icon} className="w-5 h-5 text-indigo-600" /></div>
                                            </div>
                                            <h2 className={`text-3xl font-black ${kpi.color}`}>{kpi.val}</h2>
                                        </div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                    <div className="lg:col-span-2 bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm h-[400px]">
                                        <h3 className="font-bold text-lg mb-6">RTO Trends</h3>
                                        <ResponsiveContainer width="100%" height="85%">
                                            <AreaChart data={TREND_DATA}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} />
                                                <YAxis axisLine={false} tickLine={false} />
                                                <Tooltip />
                                                <Area type="monotone" dataKey="rto" stroke="#6366f1" fill="#6366f1" fillOpacity={0.1} />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                        <h3 className="font-bold text-lg mb-6">Failure Reasons</h3>
                                        <ResponsiveContainer width="100%" height={220}>
                                            <PieChart><Pie data={REASONS} innerRadius={60} outerRadius={80} dataKey="value">{REASONS.map((e, i) => <Cell key={i} fill={e.color} />)}</Pie><Tooltip /></PieChart>
                                        </ResponsiveContainer>
                                        <div className="mt-6 space-y-3">{REASONS.map((r, i) => <div key={i} className="flex justify-between text-sm font-bold text-slate-600"><div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full" style={{backgroundColor: r.color}} /> {r.name}</div><span className="text-slate-900">{r.value}%</span></div>)}</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'scan' && (
                            <div className="max-w-4xl mx-auto space-y-10 animate-in">
                                <div className="bg-white p-16 rounded-[3rem] border-2 border-dashed border-slate-200 text-center">
                                    <h2 className="text-3xl font-black text-slate-900 mb-6">Visual Product Analysis</h2>
                                    <input type="file" id="scan-upload" className="hidden" accept="image/*" onChange={handleImageAnalysis} />
                                    <label htmlFor="scan-upload" className={`inline-flex items-center gap-4 px-10 py-5 rounded-[1.5rem] font-black transition-all ${loading ? 'bg-slate-300 text-slate-500' : 'bg-indigo-600 text-white cursor-pointer shadow-xl hover:bg-indigo-700'}`}>
                                        <Icon name={loading ? "Loader2" : "Upload"} className={loading ? "animate-spin" : ""} /> {loading ? "Analyzing..." : "Upload Image"}
                                    </label>
                                </div>
                                {scanResult && !loading && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 animate-in">
                                        <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
                                            <h3 className="text-3xl font-black capitalize mb-6">{scanResult.item}</h3>
                                            <div className="flex gap-6"><div className="flex-1 bg-red-50 p-6 rounded-3xl"><p className="text-xs font-bold text-red-400">RTO Risk</p><p className="text-3xl font-black text-red-600">{scanResult.rto_rate}</p></div></div>
                                        </div>
                                        <div className="bg-slate-900 text-white p-10 rounded-[2.5rem]">
                                            <h4 className="font-black text-xl mb-4">Risks</h4>
                                            <ul className="space-y-2 mb-6 text-sm">{scanResult.risks.map((r, i) => <li key={i}>• {r}</li>)}</ul>
                                            <p className="text-xs text-indigo-300 italic">Fix: {scanResult.packaging_advice}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'fixes' && (
                            <div className="max-w-4xl mx-auto space-y-10 animate-in">
                                <div className="bg-indigo-600 p-12 rounded-[3.5rem] text-white">
                                    <h2 className="text-4xl font-black mb-6 italic">Actionable Intelligence</h2>
                                    <button onClick={handleDiagnostic} disabled={loading} className={`flex items-center gap-4 px-10 py-5 rounded-[1.5rem] font-black transition-all ${loading ? 'bg-indigo-800 text-indigo-400' : 'bg-white text-indigo-600 shadow-xl'}`}>
                                        <Icon name={loading ? "Loader2" : "Zap"} className={loading ? "animate-spin" : ""} /> {loading ? "Running..." : "Run Root Cause Analysis"}
                                    </button>
                                </div>
                                {rcaResult && !loading && (
                                    <div className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm animate-in">
                                        <h4 className="text-xs font-black text-indigo-400 uppercase tracking-widest mb-2">Detected Root Cause</h4>
                                        <p className="text-xl font-bold text-slate-800 mb-10 italic">"{rcaResult.root_cause}"</p>
                                        <div className="space-y-4">
                                            {rcaResult.actions.map((act, i) => (
                                                <div key={i} className="flex items-center gap-5 p-6 bg-slate-50 rounded-[2rem] font-bold text-slate-700">
                                                    <div className="w-10 h-10 rounded-2xl bg-indigo-600 text-white flex items-center justify-center">{i+1}</div> {act}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
