<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI RTO & Returns Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .animate-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts;

        // --- REAL API CONFIGURATION ---
        const GOOGLE_API_KEY = "AIzaSyALAGxz160cbT-01zqK90zj57XBLHpCIOc";
        const MODEL_ID = "gemini-1.5-flash"; // Switched to the most stable, universally available model

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = ''; 
                    const iElement = document.createElement('i');
                    iElement.setAttribute('data-lucide', kebabName);
                    if (className) iElement.setAttribute('class', className);
                    iconRef.current.appendChild(iElement);
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, kebabName, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const TREND_DATA = [{ name: 'W1', rto: 12 }, { name: 'W2', rto: 19 }, { name: 'W3', rto: 15 }, { name: 'W4', rto: 22 }];
        const REASONS_DATA = [{ name: 'Packaging', value: 45, color: '#6366f1' }, { name: 'Quality', value: 25, color: '#f59e0b' }, { name: 'Wrong Item', value: 15, color: '#10b981' }, { name: 'Rejected', value: 15, color: '#ef4444' }];

        const App = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [scanResult, setScanResult] = useState(null);
            const [rcaResult, setRcaResult] = useState(null);

            // Cleans JSON if Gemini returns markdown block (```json ... ```)
            const cleanJsonText = (text) => {
                let cleaned = text.trim();
                if (cleaned.startsWith("```json")) cleaned = cleaned.substring(7);
                else if (cleaned.startsWith("```")) cleaned = cleaned.substring(3);
                if (cleaned.endsWith("```")) cleaned = cleaned.substring(0, cleaned.length - 3);
                return cleaned.trim();
            };

            // REAL API CALL
            const callGeminiReal = async (promptText, imageBase64 = null, mimeType = "image/jpeg") => {
                setLoading(true);
                setError(null);
                
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${GOOGLE_API_KEY}`;
                
                const parts = [{ text: promptText }];
                if (imageBase64) {
                    parts.push({ inlineData: { mimeType: mimeType, data: imageBase64 } });
                }

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error?.message || "Unknown API Error");
                    }

                    const rawText = data.candidates[0].content.parts[0].text;
                    const jsonObject = JSON.parse(cleanJsonText(rawText));
                    return jsonObject;

                } catch (err) {
                    console.error("Actual API Error:", err);
                    setError("API Error: " + err.message);
                    return null;
                } finally {
                    setLoading(false);
                }
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const mimeType = file.type;
                const reader = new FileReader();
                
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    const prompt = `Analyze this product image. You must return ONLY a valid JSON object with EXACTLY these keys:
                    {
                        "item": "Name of the product",
                        "rto_rate": "Estimated RTO % (e.g., 18%)",
                        "return_rate": "Estimated Return % (e.g., 12%)",
                        "risks": ["Risk 1", "Risk 2", "Risk 3"],
                        "packaging_advice": "One specific actionable advice for packaging"
                    }`;
                    
                    const result = await callGeminiReal(prompt, base64, mimeType);
                    if (result) setScanResult(result);
                };
                reader.readAsDataURL(file);
            };

            const runDiagnostics = async () => {
                const prompt = `Act as an e-commerce logistics expert. Current data shows 45% of returns are due to "Packaging Damaged". 
                Perform a Root Cause Analysis. Return ONLY a valid JSON object with EXACTLY these keys:
                {
                    "root_cause": "A detailed 2-sentence explanation of why the packaging is failing.",
                    "actions": ["Actionable step 1", "Actionable step 2", "Actionable step 3"]
                }`;
                
                const result = await callGeminiReal(prompt);
                if (result) setRcaResult(result);
            };

            return (
                <div className="flex flex-col md:flex-row min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-full md:w-64 bg-white border-r border-slate-200 p-8 flex flex-col gap-10">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                                <Icon name="ShieldCheck" className="w-6 h-6 text-white" />
                            </div>
                            <h1 className="font-black text-xl tracking-tighter">GEN-RTO</h1>
                        </div>
                        <nav className="flex flex-col gap-2">
                            {[{id: 'overview', icon: 'LayoutDashboard', label: 'Analytics'}, {id: 'scan', icon: 'Camera', label: 'AI Scanner'}, {id: 'fixes', icon: 'Zap', label: 'AI Diagnostics'}].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-4 px-4 py-3 rounded-2xl font-bold transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    <Icon name={tab.icon} />
                                    <span>{tab.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto p-4 bg-slate-50 rounded-2xl text-center border border-slate-100">
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-green-600 flex justify-center items-center gap-2">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> Live API Active
                            </span>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-6 md:p-12 overflow-y-auto max-w-6xl mx-auto w-full">
                        <header className="mb-10">
                            <h2 className="text-4xl font-black text-slate-900 tracking-tight">Intelligence Terminal</h2>
                            <p className="text-slate-500 font-medium mt-1">Real-time analysis powered by Gemini 1.5 Flash API.</p>
                        </header>

                        {/* Error Banner */}
                        {error && (
                            <div className="mb-8 p-4 bg-red-50 border border-red-200 rounded-2xl flex items-start gap-3 text-red-700 animate-in">
                                <Icon name="AlertTriangle" className="shrink-0 mt-0.5" />
                                <div>
                                    <h4 className="font-bold">Real API Call Failed</h4>
                                    <p className="text-sm font-medium">{error}</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'overview' && (
                            <div className="animate-in grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Avg RTO</p>
                                    <h3 className="text-3xl font-black text-red-500">14.2%</h3>
                                </div>
                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Return Rate</p>
                                    <h3 className="text-3xl font-black text-orange-500">8.5%</h3>
                                </div>
                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Revenue Saved</p>
                                    <h3 className="text-3xl font-black text-indigo-600">₹12,450</h3>
                                </div>
                            </div>
                        )}

                        {activeTab === 'scan' && (
                            <div className="animate-in space-y-8 max-w-3xl mx-auto">
                                <div className="bg-white border-2 border-dashed border-slate-200 p-12 rounded-[3rem] text-center">
                                    <div className="bg-indigo-50 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6">
                                        <Icon name="Camera" className="w-10 h-10 text-indigo-600" />
                                    </div>
                                    <h3 className="text-2xl font-black mb-2">Live Product Image Scan</h3>
                                    <p className="text-slate-400 font-medium mb-8">Upload an image. This will make a real request to the Google Gemini API.</p>
                                    
                                    <input type="file" id="up" hidden accept="image/*" onChange={handleFileUpload} />
                                    <label htmlFor="up" className={`px-10 py-4 rounded-2xl font-black inline-block transition shadow-xl ${loading ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-indigo-600 text-white cursor-pointer hover:bg-indigo-700 active:scale-95'}`}>
                                        {loading ? "Waiting for Gemini API..." : "Upload Photo for AI Scan"}
                                    </label>
                                </div>

                                {scanResult && !loading && (
                                    <div className="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100 animate-in">
                                        <div className="mb-8">
                                            <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Live API Response</p>
                                            <h4 className="text-3xl font-black capitalize text-slate-800">{scanResult.item}</h4>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6 mb-8">
                                            <div className="bg-red-50 p-6 rounded-3xl"><p className="text-xs font-bold text-red-400 uppercase">RTO Risk</p><p className="text-3xl font-black text-red-600">{scanResult.rto_rate}</p></div>
                                            <div className="bg-orange-50 p-6 rounded-3xl"><p className="text-xs font-bold text-orange-400 uppercase">Return Rate</p><p className="text-3xl font-black text-orange-600">{scanResult.return_rate}</p></div>
                                        </div>
                                        <div className="bg-slate-900 text-white p-8 rounded-3xl">
                                            <p className="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">Detected Risks</p>
                                            <ul className="space-y-2 mb-6">
                                                {scanResult.risks.map((risk, i) => <li key={i} className="text-sm font-medium text-slate-300">• {risk}</li>)}
                                            </ul>
                                            <div className="pt-4 border-t border-slate-800 text-sm italic text-indigo-300">
                                                💡 <strong>Fix:</strong> {scanResult.packaging_advice}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'fixes' && (
                            <div className="animate-in space-y-8 max-w-2xl mx-auto text-center">
                                <div className="bg-indigo-900 p-12 rounded-[3.5rem] text-white shadow-2xl">
                                    <h2 className="text-4xl font-black mb-4 italic">Live RCA Engine</h2>
                                    <p className="text-indigo-200 font-medium mb-10">Makes a real-time request to Gemini 1.5 Flash to diagnose logistics logs.</p>
                                    <button onClick={runDiagnostics} disabled={loading}
                                        className={`px-10 py-4 rounded-2xl font-black flex items-center justify-center gap-3 mx-auto transition ${loading ? 'bg-indigo-800 text-indigo-400 cursor-not-allowed' : 'bg-white text-indigo-900 shadow-xl hover:bg-indigo-50 active:scale-95'}`}>
                                        <Icon name={loading ? "Loader" : "Zap"} className={loading ? "animate-spin" : ""} />
                                        {loading ? "Generating Real Data..." : "Run AI Diagnostics Now"}
                                    </button>
                                </div>

                                {rcaResult && !loading && (
                                    <div className="bg-white p-10 rounded-[3rem] text-left shadow-xl border border-slate-100 animate-in">
                                        <div className="mb-8">
                                            <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2">Live API Root Cause</p>
                                            <p className="text-xl font-bold text-slate-800 italic leading-relaxed">"{rcaResult.root_cause}"</p>
                                        </div>
                                        <div className="space-y-4">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Action Plan</p>
                                            {rcaResult.actions.map((act, i) => (
                                                <div key={i} className="flex gap-4 p-5 bg-slate-50 rounded-2xl">
                                                    <div className="bg-indigo-600 text-white w-8 h-8 rounded-xl flex items-center justify-center text-xs font-black shrink-0">{i+1}</div>
                                                    <p className="text-sm font-bold text-slate-700">{act}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
